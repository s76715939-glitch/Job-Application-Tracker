<head>

  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="font-geist">
  <section class="top-section">
    <h2 class="logo">Job Application Tracker</h2>
    <div class="counter-section">
      <div class="counter-card">
        <span>Total</span>
        <h2 class="count" id="total-job-count">0</h2>
      </div>
      <div class="counter-card">
        <span>Interview</span>
        <h2 class="count" id="total-interview-count">0</h2>
      </div>
      <div class="counter-card">
        <span>Rejected</span>
        <h2 class="count" id="total-reject-count">0</h2>
      </div>
    </div>
  </section>
  <section class="menu-heading-section">
    <h3 class="menu-heading">Available Jobs</h3>
    <p class="jobs-count-of">0 jobs</p>
  </section>
  <section class="menu-section">
    <ul class="menu-items">
      <li class="menu-item menu-active" id="all">All</li>
      <li class="menu-item" id="interview">Interview</li>
      <li class="menu-item" id="rejected">Rejected</li>
    </ul>
  </section>
