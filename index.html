<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="font-geist">
    <section class="top-section">
      <h2 class="logo">Job Application Tracker</h2>
      <div class="counter-section">
        <div class="counter-card">
          <span>Total</span>
          <h2 class="count" id="total-job-count">8</h2>
        </div>
        <div class="counter-card">
          <span>Interview</span>
          <h2 class="count" id="total-interview-count">8</h2>
        </div>
        <div class="counter-card">
          <span>Rejected</span>
          <h2 class="count" id="total-reject-count">8</h2>
        </div>
      </div>
    </section>
  </body>
</html>
